<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <form method="post">
        <div>
            <h1>Student Registration Form</h1>
        </div>

        <div>
            <label for="roll-no">Roll no:</label>
            <input type="text" name="roll-no" id="roll-no">
        </div>

        <div>
            <label for="first-name">Student Name:</label>
            <input type="text" id="first-name" placeholder="First Name">
            <span>-</span>
            <input type="text" id="last-name" placeholder="Last Name">
        </div>

        <div>
            <label for="Father-name">Father Name:</label>
            <input type="text" name="Father name" id="Father-name">
        </div>

        <div>
            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" placeholder="Day">
        </div>

        <div>
            <label for="mobile">Mobile no.:</label>
            <input type="tel" id="country-code" value="+91" maxlength="3">
            <span>-</span>
            <input type="tel" name="mobile" id="mobile" placeholder="Enter mobile number" maxlength="10">
        </div>

        <div>
            <label for="Email">Email id:</label>
            <input type="email" name="Email" id="Email">
        </div>

        <div>
            <label for="password">password:</label>
            <input type="password" name="password" id="password">
        </div>

        <div>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <div>
            <label>Department:</label>

            <input type="checkbox" id="CSE" name="Department">
            <label for="CSE">CSE</label>

            <input type="checkbox" id="IT" name="Department">
            <label for="IT">IT</label>

            <input type="checkbox" id="ECE" name="Department">
            <label for="ECE">ECE</label>

            <input type="checkbox" id="Civil" name="Department">
            <label for="Civil">Civil</label>

            <input type="checkbox" id="Mech" name="Department">
            <label for="Mech">Mech</label>
        </div>

        <div>
            <label for="courses">Select Courses:</label>
            <select name="courses" id="courses">
                <option value="">Select Current Courses's</option>
                <option value="B.Tech">B.Tech</option>
                <option value="BCA">BCA</option>
                <option value="B.Sc">B.Sc</option>
                <option value="BBA">BBA</option>
            </select>
        </div>

        <div>
            <label for="file">Student photo:</label>
            <input type="file" id="file" accept="image/*">
        </div>

        <div>
            <label for="city">City:</label>
            <input type="text" id="city">
        </div>

        <div>
            <label for="feedback">Address:</label>
            <textarea name="feedback" id="feedback" placeholder="Enter your Address!"></textarea>
        </div>

        <div>
            <button type="submit">Register</button>
        </div>


    </form>
</body>

</html>
